name: Build x86_64 packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all x86_64 packages
        run: |
          docker build --platform linux/amd64 -f - -t kominka:rebuild-x86 . <<'DEOF'
          FROM debian:bookworm-slim

          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential curl ca-certificates tar gzip bzip2 xz-utils \
              make patch git && \
              rm -rf /var/lib/apt/lists/*

          RUN curl -fLo /tmp/oils.tar.gz \
                  https://oils.pub/download/oils-for-unix-0.37.0.tar.gz && \
              cd /tmp && tar xzf oils.tar.gz && cd oils-for-unix-* && \
              ./configure --without-readline && _build/oils.sh && ./install

          COPY tests/fixtures/repo /packages
          RUN find /packages -name build -exec chmod +x {} + && \
              find /packages -name post-install -exec chmod +x {} +
          RUN mkdir -p /kominka-root/var/db/kominka/installed \
                       /kominka-root/var/db/kominka/choices && \
              chown -R root:root /kominka-root
          COPY pm.ysh /usr/bin/pm
          RUN chmod +x /usr/bin/pm
          ENV KOMINKA_MIRROR=https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev \
              KOMINKA_BIN_MIRROR=https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev \
              KOMINKA_PATH=/packages KOMINKA_ROOT=/kominka-root \
              KOMINKA_COMPRESS=gz KOMINKA_COLOR=0 KOMINKA_PROMPT=0 \
              KOMINKA_STRIP=0 KOMINKA_FORCE=1 LOGNAME=root HOME=/root

          # glibc from Debian.
          RUN mkdir -p /kominka-root/usr/lib && \
              for lib in libc.so.6 libm.so.6 libdl.so.2 libpthread.so.0 \
                         librt.so.1 libresolv.so.2 libnss_dns.so.2 \
                         libnss_files.so.2 libcrypt.so.1; do \
                  [ -f "/lib/x86_64-linux-gnu/$lib" ] && \
                  cp -a "/lib/x86_64-linux-gnu/$lib" /kominka-root/usr/lib/; \
              done && \
              cp -a /lib64/ld-linux-x86-64.so.2 /kominka-root/usr/lib/ && \
              ln -sf usr/lib /kominka-root/lib && \
              ln -sf usr/lib /kominka-root/lib64 && \
              mkdir -p /kominka-root/var/db/kominka/installed/glibc && \
              echo "2.38 3" > /kominka-root/var/db/kominka/installed/glibc/version && \
              printf '#!/bin/sh\n:\n' > /kominka-root/var/db/kominka/installed/glibc/build && \
              chmod +x /kominka-root/var/db/kominka/installed/glibc/build

          RUN pm b zig && pm i zig
          ENV PATH=/kominka-root/usr/bin:$PATH

          RUN pm b linux-headers && pm i linux-headers
          RUN mkdir -p /kominka-root/var/db/kominka/installed/perl && \
              echo "999 1" > /kominka-root/var/db/kominka/installed/perl/version

          RUN pm b baselayout && pm i baselayout
          RUN pm b busybox && pm i busybox
          RUN pm b baseinit && pm i baseinit
          RUN pm b runit && pm i runit
          RUN pm b zlib && pm i zlib
          RUN pm b boringssl && pm i boringssl
          RUN pm b curl && pm i curl
          RUN pm b ca-certificates && pm i ca-certificates
          RUN pm b opendoas || true
          RUN pm b make && pm i make
          RUN pm b samurai && pm i samurai
          RUN pm b cmake && pm i cmake
          RUN pm b go && pm i go
          RUN pm b bzip2 && pm i bzip2
          RUN pm b xz && pm i xz
          RUN pm b pkgconf && pm i pkgconf
          RUN pm b m4 && pm i m4
          RUN pm b bison && pm i bison
          RUN pm b git && pm i git
          RUN pm b ysh && pm i ysh
          DEOF

      - name: Extract tarballs
        run: |
          mkdir -p artifacts
          docker create --name builder kominka:rebuild-x86 true
          docker cp builder:/root/.cache/kominka/bin/. artifacts/
          docker rm builder
          echo "=== x86_64 packages ==="
          ls -lhS artifacts/*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-packages
          path: artifacts/*.tar.gz
          retention-days: 30
