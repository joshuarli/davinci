name: Rebuild packages

# Rebuilds packages whose R2 binaries used CPU instructions not exposed
# by Apple Virtualization.framework (SVE, PAC/BTI, etc.).
#
# Uses ubuntu:24.04 + apt for build tools — no R2 dependency for the
# toolchain, which avoids the libssl.so.3/zig-404 bootstrap failures.
# pm.ysh applies the march baseline to all source builds:
#   aarch64: armv8-a+lse+crypto  (zig-compatible; LSE atomics + hw crypto)
#   x86_64:  x86-64-v3           (AVX2/FMA/BMI2, 2013+)
#
# Add packages to the RUN step in dependency order.

on:
  workflow_dispatch:

jobs:
  rebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest     }
          - { arch: arm64, runner: ubuntu-24.04-arm  }
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build packages
        run: |
          docker build -t builder -f - . <<'DEOF'
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y --no-install-recommends \
                cmake ninja-build gcc g++ golang-go make pkg-config wget \
                xz-utils ca-certificates && rm -rf /var/lib/apt/lists/*

          # Fetch ysh from R2 — Ubuntu wget speaks modern TLS.
          RUN case $(uname -m) in \
                x86_64)  ARCH=x86_64-linux-gnu ;; \
                aarch64) ARCH=aarch64-linux-gnu ;; \
              esac && \
              wget -qO- \
                "https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev/${ARCH}/ysh/0.37.0-2.tar.gz" | \
              tar xzf - -C / ./usr/local/bin/

          COPY pm.ysh /usr/bin/pm
          RUN chmod +x /usr/bin/pm
          COPY tests/fixtures/repo /packages

          RUN mkdir -p /var/db/kominka/installed /var/db/kominka/choices

          # Pre-register system and build-tool packages so pm doesn't
          # try to fetch them from R2.  Build tools come from apt above.
          RUN for pkg in \
                glibc zlib linux-headers \
                cmake samurai go zig make m4 bison pkgconf; do \
              mkdir -p /var/db/kominka/installed/$pkg && \
              echo "0 0" > /var/db/kominka/installed/$pkg/version && \
              printf '#!/bin/sh\n:\n' > /var/db/kominka/installed/$pkg/build && \
              chmod +x /var/db/kominka/installed/$pkg/build && \
              touch /var/db/kominka/installed/$pkg/manifest; \
            done

          ENV KOMINKA_PATH=/packages \
              KOMINKA_COMPRESS=gz \
              KOMINKA_COLOR=0 \
              KOMINKA_PROMPT=0 \
              KOMINKA_FORCE=1 \
              LOGNAME=root \
              HOME=/root

          RUN pm b boringssl && pm i boringssl && pm b curl
          DEOF

          docker create --name extract builder
          mkdir -p out
          docker cp "extract:/root/.cache/kominka/bin/." out/
          docker rm extract
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: out/*.tar.gz
