name: Rebuild packages

# Rebuilds packages for R2. Uses kominka:core as the build environment —
# the same isolated Kominka system that runs the packages, so pm works
# correctly without pre-registration hacks.
#
# Done: boringssl, curl, samurai, zlib, xz, sqlite, busybox, bzip2,
#       e2fsprogs, libevent
#
# To add a package:
#   - { pkg: NAME, arch: amd64, runner: ubuntu-latest     }
#   - { pkg: NAME, arch: arm64, runner: ubuntu-24.04-arm  }

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pkg: _none, arch: amd64, runner: ubuntu-latest }
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache kominka:core
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/kominka-core.tar.gz
          key: kominka-core-${{ matrix.arch }}-${{ hashFiles('Dockerfile', 'pm.ysh', 'tests/fixtures/repo/**/PKGBUILD.ysh') }}

      - name: Build kominka:core
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker build --no-cache -t kominka:core .
          docker save kominka:core | gzip > /tmp/kominka-core.tar.gz

      - name: Load kominka:core
        if: steps.cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/kominka-core.tar.gz

      - name: Build ${{ matrix.pkg }}
        run: |
          docker build -t builder \
            --build-arg PKG="${{ matrix.pkg }}" \
            -f - . <<'DEOF'
          FROM kominka:core
          ARG PKG
          COPY tests/fixtures/repo /packages
          ENV KOMINKA_PATH=/packages \
              KOMINKA_BIN_MIRROR=https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev \
              KOMINKA_COMPRESS=gz \
              KOMINKA_COLOR=0 \
              KOMINKA_PROMPT=0 \
              KOMINKA_FORCE=1 \
              LOGNAME=root \
              HOME=/root
          RUN pm i build-essential && pm b $PKG
          DEOF

          docker create --name extract builder
          mkdir -p out
          docker cp "extract:/root/.cache/kominka/bin/." out/
          docker rm extract
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}-${{ matrix.arch }}
          path: out/*.tar.gz
