name: Build package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package name to build
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest     }
          - { arch: arm64, runner: ubuntu-24.04-arm  }
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache kominka:core
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/kominka-core.tar.gz
          key: kominka-core-${{ matrix.arch }}-${{ hashFiles('Dockerfile', 'pm.ysh', 'packages/**/PKGBUILD.ysh') }}

      - name: Build kominka:core
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker build --no-cache -t kominka:core .
          docker save kominka:core | gzip > /tmp/kominka-core.tar.gz

      - name: Load kominka:core
        if: steps.cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/kominka-core.tar.gz

      - name: Build ${{ inputs.package }}
        run: |
          docker build -t builder \
            --build-arg PKG="${{ inputs.package }}" \
            --build-context packages=packages \
            -f - . <<'DEOF'
          FROM kominka:core
          ARG PKG
          COPY --from=packages / /packages
          ENV KOMINKA_PATH=/packages \
              KOMINKA_BIN_MIRROR=https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev \
              KOMINKA_COMPRESS=gz \
              KOMINKA_COLOR=0 \
              KOMINKA_PROMPT=0 \
              KOMINKA_FORCE=1 \
              LOGNAME=root \
              HOME=/root
          RUN pm i build-essential && pm b $PKG
          DEOF

          docker create --name extract builder
          mkdir -p out
          # Copy only the target package's tarball, not everything pm installed.
          PKG="${{ inputs.package }}"
          docker cp "extract:/root/.cache/kominka/bin/." /tmp/allpkgs/
          cp /tmp/allpkgs/${PKG}@*.tar.* out/
          docker rm extract
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ inputs.package }}-${{ matrix.arch }}
          path: out/*.tar.gz
