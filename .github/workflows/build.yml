name: Build package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package name to build
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest     }
          - { arch: arm64, runner: ubuntu-24.04-arm  }
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ inputs.package }}
        run: |
          docker build -t builder \
            --build-arg PKG="${{ inputs.package }}" \
            -f - . <<'DEOF'
          FROM ubuntu:24.04
          ARG PKG
          ENV DEBIAN_FRONTEND=noninteractive

          # Packages not yet in R2: provided by apt, pre-registered in Kominka
          # so pm doesn't try to fetch them from R2.
          RUN apt-get update && apt-get install -y --no-install-recommends \
                wget ca-certificates m4 make bison cmake pkg-config git golang-go \
                && rm -rf /var/lib/apt/lists/*

          RUN case $(uname -m) in \
                x86_64)  ARCH=x86_64-linux-gnu ;; \
                aarch64) ARCH=aarch64-linux-gnu ;; \
              esac && \
              wget -qO- \
                "https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev/${ARCH}/ysh/0.37.0-2.tar.gz" | \
              tar xzf - -C / ./usr/local/bin/

          COPY pm.ysh /usr/bin/pm
          RUN chmod +x /usr/bin/pm
          COPY tests/fixtures/repo /packages

          RUN mkdir -p /var/db/kominka/installed /var/db/kominka/choices

          # Pre-register: system packages pm must not clobber, plus apt-provided
          # tools. 'glibc' must be listed explicitly — package deps reference it
          # directly (e.g. samurai) and would overwrite Ubuntu's libc otherwise.
          RUN for pkg in glibc core linux-headers m4 make bison cmake pkgconf git go; do \
                mkdir -p /var/db/kominka/installed/$pkg && \
                echo "0 0" > /var/db/kominka/installed/$pkg/version && \
                printf '#!/bin/sh\n:\n' > /var/db/kominka/installed/$pkg/build && \
                chmod +x /var/db/kominka/installed/$pkg/build && \
                touch /var/db/kominka/installed/$pkg/manifest; \
              done

          ENV KOMINKA_PATH=/packages \
              KOMINKA_BIN_MIRROR=https://pub-ad5257645a73444c9056cf2aed244ac7.r2.dev \
              KOMINKA_COMPRESS=gz \
              KOMINKA_COLOR=0 \
              KOMINKA_PROMPT=0 \
              KOMINKA_FORCE=1 \
              LOGNAME=root \
              HOME=/root

          # Install build tools: zig, samurai, zlib, bzip2, xz from R2.
          # (zig cc targets a conservative baseline by default — no explicit
          # -march needed unlike the GCC-based rebuild-world builds.)
          RUN pm i build-essential

          RUN sh -c "pm b $PKG"
          DEOF

          docker create --name extract builder
          mkdir -p out
          docker cp "extract:/root/.cache/kominka/bin/." out/
          docker rm extract
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ inputs.package }}-${{ matrix.arch }}
          path: out/*.tar.gz
